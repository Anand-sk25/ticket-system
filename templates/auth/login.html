{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card">
        <h2 class="auth-title">Welcome Back</h2>
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem;">
                <input type="checkbox" id="remember" name="remember" style="width: auto; margin-bottom: 0;">
                <label for="remember"
                    style="margin-bottom: 0; font-size: 0.9rem; opacity: 0.8; cursor: pointer;">Remember Me (Highly
                    recommended for scanning)</label>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;">Login</button>
        </form>
        <p style="margin-top: 1rem; text-align: center;">
            Don't have an account? <a href="{{ url_for('auth.register') }}" class="highlight">Sign Up</a>
        </p>
    </div>
</div>
{% endblock %}
