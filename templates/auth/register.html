{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card">
        <h2 class="auth-title">Create Account</h2>
        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label for="username">Full Name</label>
                <input type="text" id="username" name="username" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" name="phone" placeholder="+91 9876543210">
            </div>
            <div class="form-group" style="display: flex; gap: 1rem;">
                <div style="flex: 1;">
                    <label for="branch">Branch</label>
                    <input type="text" id="branch" name="branch" placeholder="CSE" required>
                </div>
                <div style="flex: 1;">
                    <label for="department">Department</label>
                    <input type="text" id="department" name="department" placeholder="Engineering" required>
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Create a strong password">
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;">Sign Up</button>
        </form>
        <p style="margin-top: 1rem; text-align: center;">
            Already have an account? <a href="{{ url_for('auth.login') }}" class="highlight">Login</a>
        </p>
    </div>
</div>
{% endblock %}
