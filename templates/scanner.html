{% extends "base.html" %}

{% block title %}QR Scanner{% endblock %}

{% block content %}
<div class="container" style="text-align: center; max-width: 600px; margin: 0 auto;">
    <h1>Event Ticket Scanner</h1>
    <p style="opacity: 0.8; margin-bottom: 2rem;">Scan the QR code on the ticket to verify entry.</p>

    <div id="reader"
        style="width: 100%; border-radius: 16px; overflow: hidden; border: 2px solid var(--primary-color);"></div>

    <div id="result" style="margin-top: 2rem; display: none;">
        <div class="card" id="result-card">
            <!-- Result will be populated here -->
        </div>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<script>
    function onScanSuccess(decodedText, decodedResult) {
        // Handle the scanned code as you like, for example:
        console.log(`Code matched = ${decodedText}`, decodedResult);

        // Stop scanning
        // html5QrcodeScanner.clear();

        // Show loading or redirect
        window.location.href = decodedText;
    }

    function onScanFailure(error) {
        // handle scan failure, usually better to ignore and keep scanning.
        // for example:
        // console.warn(`Code scan error = ${error}`);
    }

    let html5QrcodeScanner = new Html5QrcodeScanner(
        "reader",
        { fps: 10, qrbox: { width: 250, height: 250 } },
        /* verbose= */ false);
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
</script>
{% endblock %}
